<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダダサバ風 無限フィールド版</title>
<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:sans-serif;text-align:center}
canvas{background:#111;display:block;margin:10px auto;border:3px solid #fff}
#ui{width:400px;margin:0 auto;text-align:left}
.bar{height:10px;background:#333;margin-top:5px}
#hp{background:#0f0;height:10px}
#xp{background:#0ff;height:6px}
</style>
</head>
<body>
<h2>無限フィールド版</h2>
<div id="ui">HP<div class="bar"><div id="hp"></div></div>XP<div class="bar"><div id="xp"></div></div></div>
<canvas id="game" width="400" height="600"></canvas>
<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");

let player={x:0,y:0,size:12,hp:100,maxHp:100,xp:0};
let camera={x:0,y:0};
let enemies=[],bullets=[];
let keys={},time=0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// 弾
setInterval(()=>{
 bullets.push({x:player.x,y:player.y,dx:0,dy:-1,speed:5});
},300);

// 四方から敵生成
setInterval(()=>{
 let angle=Math.random()*Math.PI*2;
 let dist=300+Math.random()*200;
 let ex=player.x+Math.cos(angle)*dist;
 let ey=player.y+Math.sin(angle)*dist;
 enemies.push({x:ex,y:ey,size:10,speed:1+time/60});
},300);

function update(){
 time+=1/60;

 // 移動
 if(keys.ArrowLeft)player.x-=4;
 if(keys.ArrowRight)player.x+=4;
 if(keys.ArrowUp)player.y-=4;
 if(keys.ArrowDown)player.y+=4;

 // カメラ追従
 camera.x=player.x;
 camera.y=player.y;

 // 弾
 bullets.forEach(b=>{
  b.x+=b.dx*b.speed;
  b.y+=b.dy*b.speed;
 });

 // 敵はプレイヤーに向かう
 enemies.forEach(e=>{
  let dx=player.x-e.x;
  let dy=player.y-e.y;
  let d=Math.hypot(dx,dy);
  e.x+=dx/d*e.speed;
  e.y+=dy/d*e.speed;
 });

 // 衝突
 enemies.forEach((e,ei)=>{
  bullets.forEach((b,bi)=>{
    if(Math.hypot(e.x-b.x,e.y-b.y)<12){
      enemies.splice(ei,1);
      bullets.splice(bi,1);
      player.xp+=10;
    }
  });

  if(Math.hypot(player.x-e.x,player.y-e.y)<15){
    player.hp-=1;
  }
 });
}

function draw(){
 ctx.clearRect(0,0,400,600);

 // オフセット（カメラ）
 let ox=200-camera.x;
 let oy=300-camera.y;

 // プレイヤー
 ctx.fillStyle="#0f0";
 ctx.beginPath();
 ctx.arc(player.x+ox,player.y+oy,player.size,0,Math.PI*2);
 ctx.fill();

 // 弾
 ctx.fillStyle="#ff0";
 bullets.forEach(b=>{
  ctx.fillRect(b.x+ox-2,b.y+oy-5,4,10);
 });

 // 敵
 ctx.fillStyle="#f00";
 enemies.forEach(e=>{
  ctx.beginPath();
  ctx.arc(e.x+ox,e.y+oy,e.size,0,Math.PI*2);
  ctx.fill();
 });

 // UI
 hp.style.width=(player.hp/player.maxHp*100)+"%";
 xp.style.width=(player.xp%100)+"%";
}

function loop(){update();draw();requestAnimationFrame(loop);}loop();
</script>
</body>
</html>
