<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダダサバ風ゲーム 強化版</title>
<style>
  body { margin:0; background:#111; color:#fff; font-family:sans-serif; text-align:center; }
  canvas { background:#1a1a1a; display:block; margin:10px auto; border:3px solid #fff; }
  #ui { width:400px; margin:0 auto; text-align:left; }
  #bar { height:10px; background:#333; margin-top:5px; }
  #hp { height:10px; background:#0f0; width:100%; }
  #xp { height:6px; background:#0ff; width:0%; }
  #overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.7); }
  #card { background:#222; padding:20px; border-radius:12px; }
  button { margin:5px; padding:10px; }
</style>
</head>
<body>
<h2>ダダサバ風 強化版</h2>
<div id="ui">
  HP
  <div id="bar"><div id="hp"></div></div>
  XP
  <div id="bar"><div id="xp"></div></div>
</div>
<canvas id="game" width="400" height="600"></canvas>

<div id="overlay">
  <div id="card">
    <h3>スキル選択</h3>
    <div id="choices"></div>
  </div>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player = { x:200, y:500, size:12, hp:100, maxHp:100, xp:0, lvl:1 };
let bullets=[], enemies=[], drones=[];
let keys={};
let gameOver=false;

// 入力
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// 弾
setInterval(()=>{
  bullets.push({x:player.x,y:player.y,speed:5});
},300);

// 敵
setInterval(()=>{
  enemies.push({x:Math.random()*380+10,y:0,size:10,speed:1+Math.random()*1.5, vx:(Math.random()-.5)*1});
},600);

function update(){
  if(gameOver) return;

  // 移動
  if(keys["ArrowLeft"]) player.x-=4;
  if(keys["ArrowRight"]) player.x+=4;
  if(keys["ArrowUp"]) player.y-=4;
  if(keys["ArrowDown"]) player.y+=4;

  // 弾
  bullets.forEach(b=>b.y-=b.speed);

  // ドローン
  drones.forEach((d,i)=>{
    let angle=Date.now()/500+i;
    d.x=player.x+Math.cos(angle)*30;
    d.y=player.y+Math.sin(angle)*30;
    if(Math.random()<0.1) bullets.push({x:d.x,y:d.y,speed:6});
  });

  // 敵（横詰まり）
  enemies.forEach(e=>{
    e.y+=e.speed;
    e.x+=e.vx;
    if(e.x<10||e.x>390) e.vx*=-1;
  });

  // 衝突
  enemies.forEach((e,ei)=>{
    bullets.forEach((b,bi)=>{
      let dx=b.x-e.x, dy=b.y-e.y;
      if(Math.hypot(dx,dy)<12){
        bullets.splice(bi,1);
        enemies.splice(ei,1);
        gainXP(10);
      }
    });

    let dx=player.x-e.x, dy=player.y-e.y;
    if(Math.hypot(dx,dy)<15){
      player.hp-=1;
    }
  });

  if(player.hp<=0) gameOver=true;
}

function gainXP(v){
  player.xp+=v;
  if(player.xp>=100){
    player.xp=0;
    player.lvl++;
    levelUp();
  }
}

function levelUp(){
  document.getElementById("overlay").style.display="flex";
  const choices=["攻撃速度UP","ドローン追加","回復"];
  const box=document.getElementById("choices");
  box.innerHTML="";
  choices.forEach(c=>{
    let b=document.createElement("button");
    b.textContent=c;
    b.onclick=()=>selectSkill(c);
    box.appendChild(b);
  });
}

function selectSkill(s){
  if(s==="攻撃速度UP"){
    // 速度UP
  }
  if(s==="ドローン追加"){
    drones.push({x:player.x,y:player.y});
    if(drones.length>=2){
      // 合体（強化）
      drones=[{x:player.x,y:player.y}];
      bullets.push({x:player.x,y:player.y,speed:10});
    }
  }
  if(s==="回復"){
    player.hp=Math.min(player.maxHp,player.hp+30);
  }
  document.getElementById("overlay").style.display="none";
}

function draw(){
  ctx.clearRect(0,0,400,600);

  // ぷにっと（サイズ変化）
  let pulse=1+Math.sin(Date.now()/200)*0.1;

  // プレイヤー
  ctx.fillStyle="#0f0";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size*pulse,0,Math.PI*2);
  ctx.fill();

  // 弾
  ctx.fillStyle="#ff0";
  bullets.forEach(b=>ctx.fillRect(b.x-2,b.y-5,4,10));

  // 敵
  ctx.fillStyle="#f00";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.size*pulse,0,Math.PI*2);
    ctx.fill();
  });

  // ドローン
  ctx.fillStyle="#0ff";
  drones.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,6,0,Math.PI*2);
    ctx.fill();
  });

  // UI
  document.getElementById("hp").style.width=(player.hp/player.maxHp*100)+"%";
  document.getElementById("xp").style.width=(player.xp)+"%";

  if(gameOver){
    ctx.fillStyle="#fff";
    ctx.fillText("GAME OVER",150,300);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
