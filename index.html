<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷにぷに風ゲーム完全版（画像なし）</title>
<style>
body { font-family: sans-serif; text-align: center; background:#f0f8ff; }
#game { position: relative; display: grid; grid-template-columns: repeat(6, 60px); gap: 5px; justify-content: center; margin-top: 20px; }
.cell {
  width: 60px; height: 60px; border-radius: 50%;
  animation: wobble 1s infinite;
}

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.linked { transform: scale(1.2); }

.pop { animation: pop 0.2s forwards; }
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(0); opacity:0; }
}

#line {
  position:absolute;
  top:0; left:0;
  pointer-events:none;
}

#enemy { margin-top:20px; }
#gauge { width:300px; height:20px; border:1px solid #000; margin:10px auto; }
#gauge-inner { height:100%; width:0%; background:red; }

.flash {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(255,255,0,0.4);
  animation: flash 0.5s;
}
@keyframes flash {
  from { opacity:1; }
  to { opacity:0; }
}
</style>
</head>
<body>
<h1>ぷにぷに風パズル（画像なし）</h1>
<div id="enemy">敵HP: <span id="hp">100</span></div>
<div id="gauge"><div id="gauge-inner"></div></div>
<button onclick="special()">必殺技</button>
<div id="game"></div>
<canvas id="line"></canvas>

<script>
const size = 6;
const types = ['A','B','C','D'];
const colors = {
  A: 'red',
  B: 'blue',
  C: 'green',
  D: 'purple'
};

let board = [];
let hp = 100;
let gauge = 0;
let selected = [];
let dragging = false;

const canvas = document.getElementById('line');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createBoard(){
  const game = document.getElementById('game');
  game.innerHTML = '';
  board = [];

  for(let i=0;i<size*size;i++){
    const type = types[Math.floor(Math.random()*types.length)];
    board.push(type);

    const cell = document.createElement('div');
    cell.className='cell';
    cell.style.background = colors[type];
    cell.dataset.index=i;

    cell.addEventListener('mousedown',()=>startDrag(i));
    cell.addEventListener('mouseenter',()=>dragOver(i));

    game.appendChild(cell);
  }
}

function getPos(i){
  const el=document.querySelectorAll('.cell')[i];
  const r=el.getBoundingClientRect();
  return {x:r.left+r.width/2, y:r.top+r.height/2};
}

function drawLine(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(selected.length<2) return;
  ctx.strokeStyle='orange';
  ctx.lineWidth=8;
  ctx.beginPath();
  selected.forEach((i,idx)=>{
    const p=getPos(i);
    if(idx===0) ctx.moveTo(p.x,p.y);
    else ctx.lineTo(p.x,p.y);
  });
  ctx.stroke();
}

function startDrag(i){
  dragging=true;
  clearSelect();
  selected.push(i);
  highlight(i);
}

function dragOver(i){
  if(!dragging) return;
  if(selected.includes(i)) return;
  if(board[selected[0]]===board[i]){
    selected.push(i);
    highlight(i);
    drawLine();
  }
}

document.addEventListener('mouseup', endDrag);

function endDrag(){
  if(!dragging) return;
  dragging=false;

  if(selected.length>=3){
    selected.forEach(i=>{
      const el=document.querySelectorAll('.cell')[i];
      el.classList.add('pop');
    });

    setTimeout(()=>{
      const dmg=selected.length*2;
      hp-=dmg;
      gauge+=selected.length*5;

      for(let col=0;col<size;col++){
        let stack=[];
        for(let row=size-1;row>=0;row--){
          let idx=row*size+col;
          if(!selected.includes(idx)) stack.push(board[idx]);
        }
        for(let row=size-1;row>=0;row--){
          let idx=row*size+col;
          board[idx]=stack.shift()||types[Math.floor(Math.random()*types.length)];
        }
      }

      update();
      render();
    },200);
  }

  clearSelect();
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function highlight(i){
  document.querySelectorAll('.cell')[i].classList.add('linked');
}

function clearSelect(){
  selected=[];
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('linked','pop'));
}

function render(){
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    cell.style.background = colors[board[i]];
  });
}

function update(){
  if(hp<0) hp=0;
  if(gauge>100) gauge=100;
  document.getElementById('hp').textContent=hp;
  document.getElementById('gauge-inner').style.width=gauge+'%';
}

function special(){
  if(gauge>=100){
    hp-=30;
    gauge=0;
    update();

    const flash=document.createElement('div');
    flash.className='flash';
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),500);
  }
}

createBoard();
</script>
</body>
</html>
