<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷにぷに風ゲーム完成強化版</title>
<style>
body { font-family: sans-serif; text-align: center; background:#eaf6ff; }
#game { position: relative; display: grid; grid-template-columns: repeat(6, 60px); gap: 0px; justify-content: center; margin-top: 20px; border: 4px solid #333; background:#cfe9ff; padding:5px; border-radius:10px; }

.cell {
  width: 60px; height: 60px; border-radius: 50%;
  margin: 0;

  width: 60px; height: 60px; border-radius: 50%;
  box-shadow: inset -4px -6px 10px rgba(0,0,0,0.2), inset 4px 6px 10px rgba(255,255,255,0.5);
  animation: wobble 1s infinite;
}

/* グラデーション */
.A { background: radial-gradient(circle at 30% 30%, #ff9999, #cc0000); }
.B { background: radial-gradient(circle at 30% 30%, #9999ff, #0000cc); }
.C { background: radial-gradient(circle at 30% 30%, #99ff99, #009900); }
.D { background: radial-gradient(circle at 30% 30%, #cc99ff, #6600cc); }

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.linked { transform: scale(1.25); }

.pop { animation: pop 0.25s forwards; }
@keyframes pop {
  0% { transform: scale(1); }
  60% { transform: scale(1.5); }
  100% { transform: scale(0); opacity:0; }
}

#line { position:absolute; top:0; left:0; pointer-events:none; }

#enemy { margin-top:20px; font-weight:bold; }
#gauge { width:300px; height:20px; border:1px solid #000; margin:10px auto; }
#gauge-inner { height:100%; width:0%; background:linear-gradient(to right, orange, red); }

#score, #combo { font-size:20px; margin-top:10px; }

.floating {
  position:absolute;
  font-weight:bold;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  0% { opacity:1; transform:translateY(0); }
  100% { opacity:0; transform:translateY(-50px); }
}

.flash {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(255,255,0,0.4);
  animation: flash 0.5s;
}
@keyframes flash {
  from { opacity:1; }
  to { opacity:0; }
}
</style>
</head>
<body>
<h1>ぷにぷに風パズル最終進化</h1>
<div id="enemy">敵HP: <span id="hp">100</span></div>
<div id="gauge"><div id="gauge-inner"></div></div>
<div id="score">スコア: 0</div>
<div id="combo">コンボ: 0</div>
<button onclick="special()">必殺技</button>
<div id="game"></div>
<canvas id="line"></canvas>

<script>
const size = 6;
const types = ['A','B','C','D'];

let board = [];
let hp = 100;
let gauge = 0;
let score = 0;
let combo = 0;
let selected = [];
let dragging = false;

const canvas = document.getElementById('line');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createBoard(){
  const game = document.getElementById('game');
  game.innerHTML = '';
  board = [];

  for(let i=0;i<size*size;i++){
    const type = types[Math.floor(Math.random()*types.length)];
    board.push(type);

    const cell = document.createElement('div');
    cell.className='cell '+type;
    cell.dataset.index=i;

    cell.addEventListener('mousedown',()=>startDrag(i));
    cell.addEventListener('mouseenter',()=>dragOver(i));

    game.appendChild(cell);
  }
}

function getPos(i){
  const el=document.querySelectorAll('.cell')[i];
  const r=el.getBoundingClientRect();
  return {x:r.left+r.width/2, y:r.top+r.height/2};
}

function drawLine(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(selected.length<2) return;

  const gameRect = document.getElementById('game').getBoundingClientRect();

  ctx.strokeStyle='orange';
  ctx.lineWidth=10;
  ctx.lineJoin='round';
  ctx.lineCap='round';

  const points = selected.map(i=>{
    const el = document.querySelectorAll('.cell')[i];
    const r = el.getBoundingClientRect();
    return {
      x: r.left + r.width/2 - gameRect.left,
      y: r.top + r.height/2 - gameRect.top
    };
  });

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for(let i=1;i<points.length-1;i++){
    const xc = (points[i].x + points[i+1].x)/2;
    const yc = (points[i].y + points[i+1].y)/2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
  }

  // 最後の点
  const last = points.length-1;
  ctx.quadraticCurveTo(points[last-1].x, points[last-1].y, points[last].x, points[last].y);

  ctx.stroke();
}

function startDrag(i){
  dragging=true;
  clearSelect();
  selected.push(i);
  highlight(i);
}

function dragOver(i){
  if(!dragging) return;
  if(selected.includes(i)) return;
  if(board[selected[0]]===board[i]){
    selected.push(i);
    highlight(i);
    drawLine();
  }
}

document.addEventListener('mouseup', endDrag);

function endDrag(){
  if(!dragging) return;
  dragging=false;

  if(selected.length>=3){
    const toRemove = [...selected];
    combo++;
    const base = toRemove.length * 10;
    const bonus = combo * 5;
    const total = base + bonus;

    score += total;
    hp -= toRemove.length * 2;
    gauge += toRemove.length * 5;

    showScore(total);

    toRemove.forEach(i=>{
      document.querySelectorAll('.cell')[i].classList.add('pop');
    });

    setTimeout(()=>{
      for(let col=0;col<size;col++){
        let stack=[];
        for(let row=size-1;row>=0;row--){
          let idx=row*size+col;
          if(!toRemove.includes(idx)) stack.push(board[idx]);
        }
        for(let row=size-1;row>=0;row--){
          let idx=row*size+col;
          board[idx]=stack.shift()||types[Math.floor(Math.random()*types.length)];
        }
      }
      update();
      render();
    },250);
  } else {
    combo = 0;
  }

  clearSelect();
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function showScore(val){
  const el=document.createElement('div');
  el.className='floating';
  el.textContent='+'+val;
  el.style.left='50%';
  el.style.top='50%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function highlight(i){
  document.querySelectorAll('.cell')[i].classList.add('linked');
}

function clearSelect(){
  selected=[];
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('linked','pop'));
}

function render(){
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    cell.className='cell '+board[i];
  });
}

function update(){
  if(hp<0) hp=0;
  if(gauge>100) gauge=100;
  document.getElementById('hp').textContent=hp;
  document.getElementById('gauge-inner').style.width=gauge+'%';
  document.getElementById('score').textContent='スコア: '+score;
  document.getElementById('combo').textContent='コンボ: '+combo;
}

function special(){
  if(gauge>=100){
    hp-=30;
    gauge=0;
    update();

    const flash=document.createElement('div');
    flash.className='flash';
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),500);
  }
}

createBoard();
</script>
</body>
</html>
