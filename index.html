<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ダダサバ風 完成版</title>
<style>
body{margin:0;background:#000;color:#fff;text-align:center}
canvas{background:#111;display:block;margin:10px auto}
</style>
</head>
<body>

<h2>ダダサバ風ゲーム</h2>
<canvas id="game" width="400" height="600"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// プレイヤー
let player = {x:200, y:300, size:10};

// 敵
let enemies = [];
setInterval(()=>{
  enemies.push({
    x: Math.random()*400,
    y: Math.random()*600,
    size:10
  });
},1000);

// 弾
let bullets = [];

// 自動攻撃
setInterval(()=>{
  if(enemies.length===0) return;
  let target = enemies[0];
  let dx = target.x - player.x;
  let dy = target.y - player.y;
  let d = Math.hypot(dx,dy);
  if(d===0) return;

  bullets.push({
    x: player.x,
    y: player.y,
    dx: dx/d,
    dy: dy/d
  });
},300);

// 更新
function update(){
  bullets.forEach(b=>{
    b.x += b.dx*5;
    b.y += b.dy*5;
  });
}

// 描画
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,400,600);

  // プレイヤー
  ctx.fillStyle="#0f0";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
  ctx.fill();

  // 敵
  ctx.fillStyle="#f00";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
    ctx.fill();
  });

  // 弾
  ctx.fillStyle="#ff0";
  bullets.forEach(b=>{
    ctx.fillRect(b.x-2,b.y-2,4,4);
  });
}

// ループ
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
