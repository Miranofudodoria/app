<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#000;color:#fff;text-align:center;font-family:sans-serif;}
canvas{display:block;margin:10px auto;background:#111;}
#ui{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#222;
 padding:10px;
 border-radius:10px;
 display:none;
}
button{margin:5px;padding:8px 16px;}
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>
<div id="ui"></div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let player={x:200,y:300,size:10,hp:100,maxHp:100,xp:0,level:1};
let enemies=[],bullets=[],xpOrbs=[];
let damage=2;
let xpRequired=100;
let keys={};
let gamePaused=false;

window.addEventListener("keydown",e=>{if(!gamePaused) keys[e.key]=true;});
window.addEventListener("keyup",e=>keys[e.key]=false);
function resetKeys(){keys={};}

// 敵生成（調整済み）
setInterval(()=>{
  if(gamePaused) return;

  let ang=Math.random()*Math.PI*2;
  let dist=250;
  let type=Math.random();
  let enemy;

  if(type<0.6){
    enemy={
      x:player.x+Math.cos(ang)*dist,
      y:player.y+Math.sin(ang)*dist,
      size:10,
      hp:3 + player.level*0.8,
      speed:1.5,
      color:"#f00"
    };
  }else if(type<0.85){
    enemy={
      x:player.x+Math.cos(ang)*dist,
      y:player.y+Math.sin(ang)*dist,
      size:8,
      hp:2 + player.level*0.6,
      speed:2.5,
      color:"#ff8800"
    };
  }else{
    enemy={
      x:player.x+Math.cos(ang)*dist,
      y:player.y+Math.sin(ang)*dist,
      size:16,
      hp:8 + player.level*1.5,
      speed:0.8,
      color:"#8800ff"
    };
  }

  enemies.push(enemy);
},600);

// 自動攻撃
setInterval(()=>{
  if(enemies.length===0 || gamePaused)return;
  let t=enemies[0];
  let dx=t.x-player.x,dy=t.y-player.y,d=Math.hypot(dx,dy);
  bullets.push({x:player.x,y:player.y,dx:dx/d,dy:dy/d});
},250);

// 更新
function update(){
  if(gamePaused) return;

  // 移動
  if(keys["ArrowUp"])player.y-=4;
  if(keys["ArrowDown"])player.y+=4;
  if(keys["ArrowLeft"])player.x-=4;
  if(keys["ArrowRight"])player.x+=4;

  // 弾
  bullets.forEach(b=>{
    b.x+=b.dx*8;
    b.y+=b.dy*8;
  });

  // 敵
  enemies.forEach(e=>{
    let dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
    e.x+=dx/d*e.speed;
    e.y+=dy/d*e.speed;

    if(d<player.size+e.size){
      player.hp-=0.3;
    }
  });

  // 衝突（HP制）
  enemies.forEach((e,ei)=>{
    bullets.forEach((b,bi)=>{
      if(Math.hypot(e.x-b.x,e.y-b.y)<e.size){
        e.hp -= damage;

        if(e.hp<=0){
          xpOrbs.push({x:e.x,y:e.y});
          enemies.splice(ei,1);
        }

        bullets.splice(bi,1);
      }
    });
  });

  // XP（吸いすぎ防止）
  xpOrbs.forEach((o,oi)=>{
    let dx=player.x-o.x,dy=player.y-o.y,d=Math.hypot(dx,dy);

    if(d<15){
      xpOrbs.splice(oi,1);
      let xpGain=Math.max(5,20-(player.level-1)*2);
      player.xp+=xpGain;

    } else if(d<100){
      o.x+=dx/d*3;
      o.y+=dy/d*3;
    }
  });

  // レベルアップ
  while(player.xp>=xpRequired){
    player.xp-=xpRequired;
    player.level++;
    xpRequired=100+(player.level-1)*25;
    levelUp();
  }

  if(player.hp<=0) gamePaused=true;
}

// レベルアップUI
function levelUp(){
  gamePaused=true;
  resetKeys();

  const ui=document.getElementById("ui");
  ui.innerHTML="";
  ui.style.display="block";

  const skills=["攻撃力UP","回復","攻撃速度UP"];
  
  for(let i=0;i<3;i++){
    let s=skills[Math.floor(Math.random()*skills.length)];
    const btn=document.createElement("button");
    btn.innerText=s;

    btn.onclick=()=>{
      if(s==="攻撃力UP") damage+=1;
      if(s==="回復") player.hp=Math.min(player.maxHp,player.hp+30);
      if(s==="攻撃速度UP"){}

      ui.style.display="none";
      gamePaused=false;
    };

    ui.appendChild(btn);
  }
}

// 描画
function draw(){
  ctx.fillStyle="#228B22";
  ctx.fillRect(0,0,400,600);

  // プレイヤー
  ctx.fillStyle="#0f0";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
  ctx.fill();

  // 敵
  enemies.forEach(e=>{
    ctx.fillStyle=e.color;
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
    ctx.fill();
  });

  // 弾
  ctx.fillStyle="#ff0";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fill();
  });

  // XP
  ctx.fillStyle="#0ff";
  xpOrbs.forEach(o=>{
    ctx.beginPath();
    ctx.arc(o.x,o.y,5,0,Math.PI*2);
    ctx.fill();
  });

  // UI
  ctx.fillStyle="#333";
  ctx.fillRect(10,10,200,10);
  ctx.fillStyle="#0f0";
  ctx.fillRect(10,10,200*(player.hp/player.maxHp),10);

  ctx.fillStyle="#333";
  ctx.fillRect(10,25,200,5);
  ctx.fillStyle="#0ff";
  ctx.fillRect(10,25,200*(player.xp/xpRequired),5);

  ctx.fillStyle="#fff";
  ctx.fillText("Lv "+player.level,220,30);

  if(player.hp<=0){
    ctx.fillStyle="#fff";
    ctx.font="30px sans-serif";
    ctx.fillText("GAME OVER",90,300);
  }
}

// ループ
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
