<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷにぷに風ゲーム進化版</title>
<style>
  body { font-family: sans-serif; text-align: center; background:#f0f8ff; }
  #game { display: grid; grid-template-columns: repeat(6, 60px); gap: 5px; justify-content: center; margin-top: 20px; }
  .cell {
    width: 60px; height: 60px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; user-select:none;
    transition: transform 0.1s;
    animation: wobble 1s infinite;
    overflow:hidden;
  }

  .cell img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 50%;
  }

  @keyframes wobble {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .linked {
    transform: scale(1.2);
  }

  #enemy { margin-top:20px; }
  #gauge { width: 300px; height: 20px; border:1px solid #000; margin:10px auto; }
  #gauge-inner { height:100%; width:0%; background:red; }
</style>
</head>
<body>
<h1>ぷにぷに風パズル（進化版）</h1>
<div id="enemy">敵HP: <span id="hp">100</span></div>
<div id="gauge"><div id="gauge-inner"></div></div>
<button onclick="special()">必殺技</button>
<div id="game"></div>

<script>
const size = 6;
const types = ['A','B','C','D'];

const images = {
  A: 'https://i.imgur.com/1Xq9BiB.png',
  B: 'https://i.imgur.com/8Qf6R5O.png',
  C: 'https://i.imgur.com/3ZQ3Z4R.png',
  D: 'https://i.imgur.com/0rVeh4A.png'
};

let board = [];
let hp = 100;
let gauge = 0;
let selected = [];
let dragging = false;

function createBoard(){
  const game = document.getElementById('game');
  game.innerHTML = '';
  board = [];

  for(let i=0;i<size*size;i++){
    const type = types[Math.floor(Math.random()*types.length)];
    board.push(type);

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;

    const img = document.createElement('img');
    img.src = images[type];
    cell.appendChild(img);

    cell.addEventListener('mousedown', () => startDrag(i));
    cell.addEventListener('mouseenter', () => dragOver(i));

    game.appendChild(cell);
  }
}

function startDrag(i){
  dragging = true;
  clearSelect();
  selected.push(i);
  highlight(i);
}

function dragOver(i){
  if(!dragging) return;
  if(selected.includes(i)) return;

  if(board[selected[0]] === board[i]){
    selected.push(i);
    highlight(i);
  }
}

document.addEventListener('mouseup', endDrag);

function endDrag(){
  if(!dragging) return;
  dragging = false;

  if(selected.length >= 3){
    const dmg = selected.length * 2;
    hp -= dmg;
    gauge += selected.length * 5;

    selected.forEach(i => {
      board[i] = types[Math.floor(Math.random()*types.length)];
    });

    update();
  }

  clearSelect();
  render();
}

function highlight(i){
  const cell = document.querySelectorAll('.cell')[i];
  cell.classList.add('linked');
}

function clearSelect(){
  selected = [];
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('linked'));
}

function render(){
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    const img = cell.querySelector('img');
    img.src = images[board[i]];
  });
}

function update(){
  if(hp<0) hp=0;
  if(gauge>100) gauge=100;
  document.getElementById('hp').textContent = hp;
  document.getElementById('gauge-inner').style.width = gauge+'%';
}

function special(){
  if(gauge>=100){
    hp -= 30;
    gauge = 0;
    update();
  }
}

createBoard();
</script>
</body>
</html>
